<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🧠 Второй Мозг</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-primary: #08090a;
      --bg-panel: #0f1011;
      --bg-surface: #191a1b;
      --bg-hover: #28282c;
      --text-primary: #f7f8f8;
      --text-secondary: #d0d6e0;
      --text-tertiary: #8a8f98;
      --text-muted: #62666d;
      --accent: #5e6ad2;
      --accent-hover: #828fff;
      --border: rgba(255,255,255,0.08);
      --border-subtle: rgba(255,255,255,0.05);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv01', 'ss03';
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }
    
    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,9,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title {
      font-size: 18px;
      font-weight: 590;
      letter-spacing: -0.24px;
      flex: 1;
    }
    .header-emoji { font-size: 22px; }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    .icon-btn:active { background: rgba(255,255,255,0.08); }
    
    /* Search */
    .search-bar {
      margin: 12px 16px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
    }
    .search-bar input::placeholder { color: var(--text-tertiary); }
    .search-bar input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
    }
    
    /* Quick Stats */
    .quick-stats {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      margin-bottom: 16px;
      overflow-x: auto;
    }
    .stat-card {
      flex-shrink: 0;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      min-width: 100px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 510;
      letter-spacing: -0.3px;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 510;
      color: var(--text-muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 16px;
      margin-bottom: 12px;
      background: var(--bg-panel);
      border-radius: var(--radius-md);
      margin-left: 16px;
      margin-right: 16px;
      padding: 3px;
    }
    .tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 510;
      color: var(--text-tertiary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--accent);
      color: white;
    }
    .tab:active { opacity: 0.8; }
    
    /* Entry List */
    .entries {
      padding: 0 16px;
      padding-bottom: 80px;
    }
    .entry-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .entry-card:active {
      background: var(--bg-hover);
      transform: scale(0.99);
    }
    .entry-title {
      font-size: 15px;
      font-weight: 510;
      letter-spacing: -0.165px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .entry-preview {
      font-size: 13px;
      color: var(--text-tertiary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .entry-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 510;
    }
    .entry-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .tag {
      font-size: 10px;
      font-weight: 510;
      padding: 2px 8px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary);
      letter-spacing: 0.2px;
    }
    .entry-type { font-size: 14px; }
    
    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15,16,17,0.98);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-subtle);
      display: flex;
      padding: 6px 0;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
    }
    .nav-item {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .nav-item.active { color: var(--accent-hover); }
    .nav-icon { font-size: 20px; display: block; }
    .nav-label { font-size: 9px; font-weight: 510; margin-top: 2px; letter-spacing: 0.3px; text-transform: uppercase; }
    
    /* Detail View */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      z-index: 200;
      overflow-y: auto;
    }
    .detail-overlay.open { display: block; }
    .detail-header {
      position: sticky;
      top: 0;
      background: rgba(8,9,10,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .detail-body { padding: 16px; }
    .detail-title {
      font-size: 22px;
      font-weight: 510;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }
    .detail-date {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 510;
      margin-bottom: 16px;
    }
    .detail-text {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }
    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .detail-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 510;
      font-family: inherit;
    }
    .detail-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .detail-btn.danger {
      border-color: var(--danger);
      color: var(--danger);
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-tertiary);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 18px; font-weight: 510; margin-bottom: 8px; }
    .empty-desc { font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <span class="header-emoji">🧠</span>
    <span class="header-title">Второй Мозг</span>
    <div class="header-actions">
      <button class="icon-btn" onclick="refreshData()">↻</button>
      <button class="icon-btn" onclick="Telegram.WebApp.close()">✕</button>
    </div>
  </div>
  
  <!-- Search -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Поиск по смыслу..." oninput="debouncedSearch()">
  </div>
  
  <!-- Quick Stats -->
  <div class="quick-stats" id="quickStats"></div>
  
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('all')">Всё</button>
    <button class="tab" onclick="switchTab('favorites')">⭐ Избранное</button>
    <button class="tab" onclick="switchTab('tasks')">📋 Задачи</button>
    <button class="tab" onclick="switchTab('recent')">🕐 Недавние</button>
  </div>
  
  <!-- Entries -->
  <div class="entries" id="entries"></div>
  
  <!-- Detail View -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">←</button>
      <span class="header-title" id="detailHeaderTitle">Запись</span>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
  
  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchPage('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Главная</span>
    </button>
    <button class="nav-item" onclick="switchPage('folders')">
      <span class="nav-icon">📂</span>
      <span class="nav-label">Папки</span>
    </button>
    <button class="nav-item" onclick="switchPage('stats')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Статистика</span>
    </button>
    <button class="nav-item" onclick="switchPage('settings')">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Настройки</span>
    </button>
  </div>
  
  <script>
    const API_BASE = 'https://api.telegram.org/bot8902296755:AAHF_xSx9WewwCR4ZpyzmSxihqpiobNBDkw';
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    let entries = [];
    let currentTab = 'all';
    let isLoading = false;
    
    // Init
    document.addEventListener('DOMContentLoaded', () => {
      loadEntries();
      if (tg.initDataUnsafe?.start_param) {
        // Deep link handling
      }
    });
    
    async function loadEntries() {
      if (isLoading) return;
      isLoading = true;
      
      const container = document.getElementById('entries');
      container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Загрузка...</div>';
      
      try {
        // For demo, generate mock data
        const mockEntries = generateMockEntries();
        entries = mockEntries;
        renderEntries(mockEntries);
        renderStats(mockEntries);
      } catch(e) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-title">Ошибка загрузки</div><div class="empty-desc">Не удалось загрузить записи</div></div>';
      } finally {
        isLoading = false;
      }
    }
    
    function renderStats(data) {
      const statsHtml = `
        <div class="stat-card">
          <div class="stat-value">${data.length}</div>
          <div class="stat-label">Записей</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${data.filter(e => e.is_favorite).length}</div>
          <div class="stat-label">⭐ Избранное</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${data.filter(e => e.is_task).length}</div>
          <div class="stat-label">📋 Задачи</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${data.filter(e => e.tags?.length || 0 > 0).length}</div>
          <div class="stat-label">🏷️ С тегами</div>
        </div>
      `;
      document.getElementById('quickStats').innerHTML = statsHtml;
    }
    
    function renderEntries(data) {
      const container = document.getElementById('entries');
      
      if (!data.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-title">Пока нет записей</div>
            <div class="empty-desc">Отправь сообщение боту — всё сохранится автоматически</div>
          </div>`;
        return;
      }
      
      const typeEmojis = { text: '📝', voice: '🎤', photo: '📷', video: '🎥', link: '🔗', file: '📎', forwarded: '📨' };
      
      let html = '';
      data.slice(0, 50).forEach(e => {
        const emoji = typeEmojis[e.content_type] || '📄';
        const date = new Date(e.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        const preview = (e.content_text || '').slice(0, 150);
        
        html += `
          <div class="entry-card" onclick="openDetail(${e.id})">
            <div class="entry-title">
              <span class="entry-type">${emoji}</span>
              <span>${e.title || 'Без названия'}</span>
              ${e.is_favorite ? '<span style="color:var(--warning)">⭐</span>' : ''}
            </div>
            <div class="entry-preview">${escapeHtml(preview)}</div>
            ${e.tags?.length ? `<div class="entry-tags">${e.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>` : ''}
            <div class="entry-meta">
              <span>${date}</span>
              ${e.is_task ? '<span>📋</span>' : ''}
            </div>
          </div>`;
      });
      
      container.innerHTML = html;
    }
    
    function openDetail(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      
      document.getElementById('detailHeaderTitle').textContent = entry.title || 'Запись';
      
      const date = new Date(entry.created_at).toLocaleDateString('ru-RU', {
        day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      
      document.getElementById('detailBody').innerHTML = `
        <div class="detail-title">${escapeHtml(entry.title || 'Без названия')}</div>
        <div class="detail-date">${date} &middot; ID: ${entry.id}</div>
        <div class="detail-text">${escapeHtml(entry.content_text || 'Нет текста')}</div>
        ${entry.tags?.length ? `<div style="margin-bottom:16px"><div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:510">ТЕГИ</div>${entry.tags.map(t => `<span class="tag" style="margin-right:4px">#${t}</span>`).join('')}</div>` : ''}
        <div class="detail-actions">
          ${entry.content_type === 'link' && entry.source_url ? `<a href="${entry.source_url}" target="_blank"><button class="detail-btn primary">🔗 Открыть ссылку</button></a>` : ''}
          <button class="detail-btn" onclick="toggleFavorite(${entry.id})">${entry.is_favorite ? '⭐ Убрать' : '⭐ В избранное'}</button>
          <button class="detail-btn" onclick="copyText(${entry.id})">📋 Копировать</button>
          <button class="detail-btn danger" onclick="deleteEntry(${entry.id})">🗑️ Удалить</button>
        </div>
      `;
      
      document.getElementById('detailOverlay').classList.add('open');
    }
    
    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('open');
    }
    
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab')[['all', 'favorites', 'tasks', 'recent'].indexOf(tab)].classList.add('active');
      
      let filtered = [...entries];
      if (tab === 'favorites') filtered = filtered.filter(e => e.is_favorite);
      if (tab === 'tasks') filtered = filtered.filter(e => e.is_task);
      if (tab === 'recent') filtered = filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 20);
      
      renderEntries(filtered);
    }
    
    function switchPage(page) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.nav-item')[['home', 'folders', 'stats', 'settings'].indexOf(page)].classList.add('active');
      // Page switching logic
    }
    
    // Search with debounce
    let searchTimer;
    function debouncedSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(doSearch, 300);
    }
    
    function doSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!query) {
        renderEntries(entries);
        return;
      }
      
      const results = entries.filter(e => {
        const searchTarget = ((e.title || '') + ' ' + (e.content_text || '') + ' ' + (e.tags || []).join(' ')).toLowerCase();
        return searchTarget.includes(query);
      });
      
      renderEntries(results);
    }
    
    function toggleFavorite(id) {
      const entry = entries.find(e => e.id === id);
      if (entry) {
        entry.is_favorite = !entry.is_favorite;
        renderEntries(entries);
        renderStats(entries);
        closeDetail();
      }
    }
    
    function copyText(id) {
      const entry = entries.find(e => e.id === id);
      if (entry?.content_text) {
        navigator.clipboard.writeText(entry.content_text);
        tg.showPopup({ title: '✅ Скопировано', message: 'Текст скопирован в буфер обмена' });
      }
    }
    
    function deleteEntry(id) {
      tg.showConfirm('Удалить эту запись?', (confirmed) => {
        if (confirmed) {
          entries = entries.filter(e => e.id !== id);
          renderEntries(entries);
          renderStats(entries);
          closeDetail();
        }
      });
    }
    
    function refreshData() {
      loadEntries();
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Mock data generator
    function generateMockEntries() {
      const types = ['text', 'voice', 'photo', 'link', 'forwarded'];
      const tags = ['идеи', 'работа', 'бизнес', 'покупки', 'книги', 'ml', 'стартап', 'здоровье', 'спорт', 'образование'];
      const titles = [
        'Идея стартапа нейросеть для диет',
        'Рецепт пасты карбонара',
        'Мысли про бизнес модель',
        'Статья про ML обучения моделей',
        'Купить продукты на неделю',
        'Позвонить маме в пятницу',
        'Идея для подарка другу',
        'Конспект книги Atomic Habits',
        'План тренировок на неделю',
        'Ссылка на статью про нейросети',
        'Мысли о переезде в другой город',
        'Список фильмов к просмотру'
      ];
      
      return Array.from({length: 25}, (_, i) => {
        const date = new Date();
        date.setDate(date.getDate() - Math.floor(Math.random() * 30));
        date.setHours(Math.floor(Math.random() * 24), Math.floor(Math.random() * 60));
        
        const entryTags = [];
        for (let j = 0; j < 1 + Math.floor(Math.random() * 4); j++) {
          const t = tags[Math.floor(Math.random() * tags.length)];
          if (!entryTags.includes(t)) entryTags.push(t);
        }
        
        return {
          id: i + 1,
          title: titles[i % titles.length],
          content_text: `Lorem ipsum dolor sit amet consectetur adipiscing elit. ${titles[i % titles.length]} sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.`,
          content_type: types[Math.floor(Math.random() * types.length)],
          created_at: date.toISOString(),
          is_favorite: Math.random() > 0.7,
          is_task: Math.random() > 0.8,
          tags: entryTags,
          source_url: i % 3 === 0 ? 'https://example.com' : null
        };
      }).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    }
  </script>
</body>
</html>
