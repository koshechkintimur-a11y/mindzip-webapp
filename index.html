<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Второй Мозг</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #08090a;
  --surface: #121314;
  --card: #1a1b1e;
  --card-hover: #222326;
  --border: rgba(255,255,255,0.06);
  --text: #f0f2f4;
  --text-secondary: #9ea3ae;
  --text-muted: #5c6169;
  --accent: #6c78e6;
  --accent-hover: #8a94ff;
  --accent-glow: rgba(108,120,230,0.15);
  --green: #34d399;
  --red: #f87171;
  --orange: #fbbf24;
  --radius: 12px;
  --radius-sm: 8px;
  font-family: 'Inter',-apple-system,sans-serif;
  -webkit-font-smoothing: antialiased;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 72px;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 2px; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,9,10,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
}
.header-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; flex: 1; }
.header-emoji { font-size: 22px; }
.header-sub { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

/* Search */
.search-wrap {
  padding: 12px 16px;
  position: sticky; top: 53px; z-index: 99;
  background: var(--bg);
}
.search-wrap input {
  width: 100%; padding: 11px 16px 11px 42px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 15px; font-family: inherit;
  outline: none; transition: border .2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 28px; top: 50%;
  transform: translateY(-50%);
  font-size: 18px; pointer-events: none;
}

/* Stats row */
.stats-row {
  display: flex; gap: 8px;
  padding: 0 16px 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.stat-pill {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 500;
}
.stat-pill .val { color: var(--accent); font-weight: 700; font-size: 16px; }

/* Entry cards */
.entries { padding: 0 16px; }
.entry-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background .15s, transform .1s;
  position: relative;
}
.entry-card:active {
  background: var(--card-hover);
  transform: scale(0.99);
}
.entry-card .title {
  font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.entry-card .preview {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.entry-card .meta {
  display: flex; align-items: center; gap: 6px;
  margin-top: 8px;
  font-size: 11px; color: var(--text-muted); font-weight: 500;
}
.entry-card .tags {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-top: 6px;
}
.tag {
  font-size: 10px; font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--accent-glow);
  color: var(--accent);
  letter-spacing: 0.2px;
}

/* Detail overlay */
.detail {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 200;
  overflow-y: auto;
  animation: slideUp .25s ease;
}
.detail.open { display: block; }
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.detail-header {
  position: sticky; top: 0;
  background: rgba(8,9,10,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.detail-body { padding: 16px; }
.detail-body .dt { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 6px; }
.detail-body .dd { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.detail-body .dc { font-size: 15px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 20px; white-space: pre-wrap; }
.detail-body .dtags { margin-bottom: 16px; }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.detail-actions button {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.detail-actions .primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.detail-actions .danger { border-color: var(--red); color: var(--red); }

/* Bottom nav */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(18,19,20,0.98);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 4px 0;
  padding-bottom: max(4px,env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  flex: 1;
  text-align: center;
  padding: 6px 0;
  cursor: pointer;
  border: none; background: transparent;
  color: var(--text-muted);
  transition: color .15s;
  position: relative;
  font-size: 11px;
}
.nav-item.active { color: var(--accent); }
.nav-item.active::after {
  content: ''; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 2px;
  background: var(--accent);
  border-radius: 1px;
}
.nav-icon { font-size: 20px; display: block; }
.nav-label { font-size: 9px; font-weight: 600; margin-top: 1px; letter-spacing: 0.3px; }

/* Pages */
.page { display: none; }
.page.active { display: block; }

/* Loading */
.loading {
  text-align: center; padding: 40px; color: var(--text-muted);
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty */
.empty {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty .icon { font-size: 42px; margin-bottom: 12px; }
.empty .t { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
.empty .d { font-size: 14px; line-height: 1.5; }

/* Folders list */
.folder-list { padding: 0 16px; }
.folder-item {
  display: flex; align-items: center;
  padding: 14px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  cursor: pointer;
  transition: background .15s;
}
.folder-item:active { background: var(--card-hover); }
.folder-item .fi { font-size: 24px; margin-right: 12px; }
.folder-item .fn { flex: 1; font-weight: 500; font-size: 15px; overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:36px }
.folder-item .fc { color: var(--text-muted); font-size: 13px; font-weight: 500; flex-shrink:0; position:absolute;right:44px;top:50%;transform:translateY(-50%); }

/* Support form */
.support-form { padding: 16px; }
.support-form textarea {
  width: 100%; padding: 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 14px; font-family: inherit;
  outline: none; resize: vertical;
  min-height: 120px;
}
.support-form textarea:focus { border-color: var(--accent); }
.support-form .send-btn {
  width: 100%; padding: 12px;
  margin-top: 12px;
  border-radius: var(--radius);
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 15px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.support-form .send-btn:active { opacity: .8; }

/* Toast */
.toast {
  position: fixed; bottom: 84px; left: 16px; right: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  text-align: center;
  font-size: 14px; font-weight: 500;
  z-index: 300;
  animation: toastIn .3s ease;
  display: none;
}
.toast.show { display: block; }
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Settings page */
.settings-page { padding: 16px; }
.setting-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
}
.setting-card .sl { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.setting-card .sv { font-size: 15px; font-weight: 500; }

/* Tags cloud */
.tags-cloud {
  padding: 0 16px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.tag-cloud-item {
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: background .15s;
}
.tag-cloud-item:active { background: var(--card-hover); }

/* Back from folder entries */
.back-row {
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: var(--accent);
  font-weight: 500;
  font-size: 14px;
}

/* Context menu */
.context-menu {
  position: fixed; inset: 0;
  z-index: 250;
  display: none;
  animation: fadeIn .15s;
}
.context-menu.open { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.context-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
}
.context-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 8px 0;
  animation: slideUp .2s ease;
}
.context-item {
  padding: 14px 20px;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background .1s;
  border: none; background: transparent;
  color: var(--text);
  width: 100%; text-align: left;
  font-family: inherit;
}
.context-item:active { background: var(--card-hover); }
.context-item.danger { color: var(--red); }

/* Card menu button */
.card-menu {
  position: absolute; top: 10px; right: 8px;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-menu:active { background: var(--card-hover); }

/* Stat clickable */
.stat-pill.clickable { cursor: pointer; }
.stat-pill.clickable:active { background: var(--card-hover); }

/* File preview */
.file-preview {
  margin-top: 8px;
  padding: 10px 12px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.file-preview .fp-icon { font-size: 24px; }
.file-preview .fp-name { flex: 1; color: var(--text-secondary); }
.file-preview .fp-open {
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}

/* Image lightbox */
.lightbox {
  position: fixed; inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 95%; max-height: 95%; border-radius: 8px; }
.lightbox .lb-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-emoji" id="headerEmoji">🧠</span>
  <span class="header-title" id="headerTitle">Второй Мозг</span>
  <span class="header-sub" id="headerSub"></span>
</div>

<!-- Page: Home -->
<div class="page active" id="pageHome">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Поиск по смыслу..." oninput="onSearch()">
  </div>
  <div class="stats-row" id="statsRow"></div>
  <div style="display:flex;gap:4px;padding:0 16px 10px;overflow-x:auto" id="filterTabs">
    <div onclick="setFilter('all')" style="flex-shrink:0;padding:6px 14px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer">📋 Всё</div>
    <div onclick="setFilter('notes')" style="flex-shrink:0;padding:6px 14px;border-radius:8px;background:var(--surface);color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer">📝 Заметки</div>
    <div onclick="setFilter('tasks')" style="flex-shrink:0;padding:6px 14px;border-radius:8px;background:var(--surface);color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer">⏰ Встречи</div>
    <div onclick="setFilter('media')" style="flex-shrink:0;padding:6px 14px;border-radius:8px;background:var(--surface);color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer">📎 Файлы</div>
  </div>
  <div class="entries" id="entriesList"></div>
</div>

<!-- Page: Search Results -->
<div class="page" id="pageSearch">
  <div class="entries" id="searchResults"></div>
</div>

<!-- Page: Folders -->
<div class="page" id="pageFolders">
  <div class="folder-list" id="foldersList"></div>
</div>

<!-- Page: Folder entries -->
<div class="page" id="pageFolderEntries">
  <div class="back-row" onclick="showPage('pageFolders')">← Назад к папкам</div>
  <div class="entries" id="folderEntriesList"></div>
</div>

<!-- Page: Favorites -->
<div class="page" id="pageFavorites">
  <div class="entries" id="favoritesList"></div>
</div>

<!-- Page: Reminders -->
<div class="page" id="pageReminders">
  <div class="entries" id="remindersList"></div>
</div>

  <!-- Page: Settings -->
  <div class="page" id="pageSettings">
    <div class="settings-page" id="settingsContent"></div>
  </div>

<!-- Detail overlay -->
<div class="detail" id="detailOverlay">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <span class="header-title" id="detailTitle">Запись</span>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- Bottom Nav -->
<div class="nav">
  <button class="nav-item active" onclick="switchTab('home')">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Главная</span>
  </button>
  <button class="nav-item" onclick="switchTab('folders')">
    <span class="nav-icon">📂</span>
    <span class="nav-label">Папки</span>
  </button>
  <button class="nav-item" onclick="switchTab('reminders')">
    <span class="nav-icon">⏰</span>
    <span class="nav-label">Напом.</span>
  </button>
  <button class="nav-item" onclick="switchTab('favorites')">
    <span class="nav-icon">⭐</span>
    <span class="nav-label">Избранное</span>
  </button>
  <button class="nav-item" onclick="switchTab('settings')">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label">Ещё</span>
  </button>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div class="context-backdrop" onclick="closeContextMenu()"></div>
  <div class="context-sheet" id="contextSheet"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <button class="lb-close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://golubot.ru/mindzip/';
let tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

let state = {
  user: null,
  dbId: null,
  entries: [],
  folders: [],
  tags: [],
  stats: null,
  currentEntry: null,
  folderEntries: [],
  currentFolderId: null,
};

// === AUTH ===
async function auth() {
  // Try Telegram initData first
  let userId = null;
  const initData = tg.initData;
  
  if (initData) {
    try {
      const resp = await fetch(API + 'auth?init_data=' + encodeURIComponent(initData));
      const data = await resp.json();
      if (data.registered) {
        state.user = data;
        state.dbId = data.db_id;
      }
      userId = data.user_id;
    } catch(e) {
      console.log('Auth error:', e);
    }
  }
  
  // Fallback: try initDataUnsafe
  if (!state.user && tg.initDataUnsafe?.user) {
    userId = tg.initDataUnsafe.user.id;
  }
  
  // Last resort: prompt (for testing outside Telegram)
  if (!userId) {
    userId = prompt('Введите ваш Telegram ID:');
  }
  
  if (userId) {
    // Try to find user by telegram_id
    try {
      const resp = await fetch(API + 'stats?user_id=' + userId);
      const stats = await resp.json();
      state.stats = stats;
      state.dbId = userId;
      state.user = { user_id: parseInt(userId), registered: true };
    } catch(e) {
      console.log('Stats fetch error:', e);
    }
  }
  
  loadData();
}

// === DATA ===
async function loadData() {
  if (!state.dbId) return;
  
  // Get user's timezone from Telegram
  const userTz = tg.initDataUnsafe?.user?.language_code === 'ru' ? 'Europe/Moscow' : 'Europe/Moscow';
  
  try {
    const [entriesResp, foldersResp, tagsResp, statsResp, friendsResp] = await Promise.all([
      fetch(API + 'entries_timezone?user_id=' + state.dbId + '&limit=100&tz=' + userTz),
      fetch(API + 'folders?user_id=' + state.dbId),
      fetch(API + 'tags?user_id=' + state.dbId),
      fetch(API + 'stats?user_id=' + state.dbId),
      fetch(API + 'friends?user_id=' + state.dbId).catch(() => ({json:()=>({friends:[]})})),
    ]);
    
    const entriesData = await entriesResp.json();
    const foldersData = await foldersResp.json();
    const tagsData = await tagsResp.json();
    const statsData = await statsResp.json();
    const friendsData = friendsResp ? await friendsResp.json() : {friends:[]};
    
    state.entries = entriesData.entries || [];
    state.folders = foldersData.folders || [];
    state.tags = tagsData.tags || [];
    state.stats = statsData;
    state.friends = friendsData.friends || [];
    
    // Load shared folders
    try {
      const sharedResp = await fetch(API + 'shared_folders?user_id=' + state.dbId);
      const sharedData = await sharedResp.json();
      state.sharedFolders = sharedData.folders || [];
    } catch(e) {
      state.sharedFolders = [];
    }
    
    renderHome();
    renderFolders();
    renderFavorites();
    renderSettings();
  } catch(e) {
    showToast('Ошибка загрузки данных');
  }
}

// === RENDER: Home ===
function renderHome() {
  const s = state.stats;
  if (s) {
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-pill clickable" onclick="filterByType('all')"><span class="val">${s.total}</span> Записей</div>
      <div class="stat-pill clickable" onclick="filterByType('favorites')"><span class="val">${s.favorites}</span> ⭐</div>
      <div class="stat-pill clickable" onclick="filterByType('week')"><span class="val">${s.this_week}</span> За неделю</div>
    `;
  }
  // Apply current filter
  setFilter(currentFilter);
}

function renderEntries(arr, containerId) {
  const el = document.getElementById(containerId);
  if (!arr.length) {
    el.innerHTML = '<div class="empty"><div class="icon">📝</div><div class="t">Пока нет записей</div><div class="d">Отправь сообщение боту — всё сохранится</div></div>';
    return;
  }
  
  const typeEmoji = { text:'📝', voice:'🎤', photo:'📷', video:'🎥', link:'🔗', file:'📎', forwarded:'📨' };
  
  el.innerHTML = arr.map(e => {
    const em = typeEmoji[e.content_type] || '📄';

    const prev = (e.content_text || '').slice(0, 150);
    const tags = (e.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');

// === DELETE ENTRY FROM MINI APP ===
async function deleteEntryFromMiniApp(id) {
  closeContextMenu();
  if (!confirm('🗑️ Удалить запись навсегда?')) return;
  try {
    const r = await fetch(API + 'entries/delete', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: state.dbId, entry_id: id})
    });
    const d = await r.json();
    if (d.ok) {
      state.entries = state.entries.filter(e => e.id !== id);
      state.folderEntries = state.folderEntries.filter(e => e.id !== id);
      showToast('✅ Запись удалена');
      const activePage = document.querySelector('.page.active');
      if (activePage) {
        if (activePage.id === 'pageHome') renderHome();
        else if (activePage.id === 'pageFolderEntries') renderEntries(state.folderEntries, 'folderEntriesList');
        else if (activePage.id === 'pageFavorites') renderFavorites();
        else if (activePage.id === 'pageReminders') renderReminders();
      }
    } else {
      showToast('❌ Ошибка удаления');
    }
  } catch(e) {
    showToast('❌ Ошибка удаления');
  }
}

// === HOME FILTER TABS ===
let currentFilter = 'all';

function setFilter(filter) {
  currentFilter = filter;
  // Update tab styles
  const tabs = document.getElementById('filterTabs');
  if (tabs) {
    const children = tabs.children;
    const labels = ['all','notes','tasks','media'];
    const tabLabels = ['📋 Всё','📝 Заметки','⏰ Встречи','📎 Файлы'];
    for (let i = 0; i < children.length; i++) {
      const isActive = labels[i] === filter;
      children[i].style.background = isActive ? 'var(--accent)' : 'var(--surface)';
      children[i].style.color = isActive ? '#fff' : 'var(--text-secondary)';
      children[i].style.fontWeight = isActive ? '600' : '500';
    }
  }
  
  let filtered = [...state.entries];
  if (filter === 'notes') {
    filtered = filtered.filter(e => e.content_type === 'text' && !e.is_task);
  } else if (filter === 'tasks') {
    filtered = filtered.filter(e => e.is_task);
  } else if (filter === 'media') {
    filtered = filtered.filter(e => ['photo','video','voice','file','audio'].includes(e.content_type));
  }
  renderEntries(filtered, 'entriesList');
}
function typeLabel(type) {
  const labels = {
    text: 'Текст', voice: 'Голосовые', photo: 'Фото',
    video: 'Видео', link: 'Ссылки', file: 'Файлы',
    forwarded: 'Пересланное', document: 'Документы',
    all: 'Все записи', favorites: 'Избранное', week: 'За неделю'
  };
  return labels[type] || type;
}

// === FILTER BY TYPE ===
async function filterByType(type) {
  let filtered = [...state.entries];
  if (type === 'favorites') {
    filtered = filtered.filter(e => e.is_favorite);
  } else if (type === 'week') {
    const weekAgo = new Date(Date.now() - 7*24*60*60*1000);
    filtered = filtered.filter(e => new Date(e.created_at) > weekAgo);
  } else if (type !== 'all') {
    // Фильтр по конкретному типу контента
    filtered = filtered.filter(e => e.content_type === type);
  }
  // Показываем на главной (но без вызова renderHome, который сбросит фильтр)
  renderEntries(filtered, 'entriesList');
  // Скрываем statsRow при фильтрации
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('headerTitle').textContent = type === 'all' ? 'Второй Мозг' : '📁 ' + typeLabel(type);
  // Показываем кнопку "Назад"
  const entriesList = document.getElementById('entriesList');
  const backBtn = document.createElement('div');
  backBtn.id = 'filterBackBtn';
  backBtn.className = 'back-row';
  backBtn.innerHTML = '← Все записи';
  backBtn.onclick = function() {
    document.getElementById('statsRow').style.display = 'flex';
    const btn = document.getElementById('filterBackBtn');
    if (btn) btn.remove();
    renderHome();
    document.getElementById('headerTitle').textContent = 'Второй Мозг';
  };
  const existing = document.getElementById('filterBackBtn');
  if (!existing) {
    entriesList.parentNode.insertBefore(backBtn, entriesList);
  }
  showPage('pageHome');
}

      <div class="setting-card" style="cursor:pointer" onclick="filterByType('favorites')"><div class="sl">⭐ В избранном</div><div class="sv">${s.favorites}</div></div>
      <div class="setting-card" style="cursor:pointer" onclick="filterByType('week')"><div class="sl">📅 За неделю</div><div class="sv">${s.this_week}</div></div>
      <div style="margin:16px 0 8px;font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:.5px">ПО ТИПАМ</div>
      ${types}
    `;
  } else if (tab === 'friends') {
    const friendsCount = (state.friends||[]).length;
    html += `<div class="setting-card"><div class="sl">👥 Друзья</div><div class="sv">${friendsCount ? friendsCount + ' друзей' : 'Нет друзей'}</div></div>`;
    
    // Show friends list
    if (friendsCount) {
      html += '<div style="margin:8px 0">';
      state.friends.forEach(f => {
        const name = f.first_name || f.username || ('ID: ' + f.id);
        html += `<div style="padding:8px 12px;background:var(--surface);border-radius:8px;margin-bottom:4px;font-size:14px">👤 ${esc(name)} ${f.username ? '@' + esc(f.username) : ''}</div>`;
      });
      html += '</div>';
    }
    }
    
    // Share link to invite friends
    html += `
      <div style="margin:12px 0;padding:14px;background:var(--surface);border-radius:10px;text-align:center">
        <div style="font-size:14px;font-weight:500;margin-bottom:8px">🔗 Пригласить друга</div>
        <button onclick="inviteFriend()" style="padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px">📤 Поделиться ссылкой</button>
      </div>
      <div style="border-top:1px solid var(--border);margin:12px 0"></div>
    `;
    
    // Referral link
    fetch(API + 'referral_stats?user_id=' + state.dbId).then(r=>r.json()).then(d => {
      const refLink = d.link || 'https://t.me/mindzip_bot?start=ref_' + state.dbId;
      html += `<div class="setting-card"><div class="sl">🔗 Твоя реферальная ссылка</div><div class="sv" style="font-size:12px;word-break:break-all">${refLink}</div></div>`;
      html += `<button class="send-btn" onclick="copyText('${refLink}')" style="margin-top:4px">📋 Скопировать</button>`;
      document.getElementById('settingsContent').innerHTML = html;
    }).catch(() => {
      document.getElementById('settingsContent').innerHTML = html;
    });
    return;
    
  } else if (tab === 'support') {
    html += `
      <div style="padding:4px 0;font-size:14px;font-weight:500;margin-bottom:8px">📬 Связь с поддержкой</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Напиши нам — можно прикрепить скриншот. Ответ придёт в бота @mindzip_support_bot</div>
      <textarea id="feedbackText" placeholder="Опишите проблему или предложение..." style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none;min-height:100px;resize:vertical"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="document.getElementById('feedbackFileInput').click()" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit">📎 Прикрепить файл</button>
        <button onclick="sendFeedback()" style="flex:2;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">📤 Отправить</button>
      </div>
      <input type="file" id="feedbackFileInput" style="display:none" onchange="handleFeedbackFile(event)">
      <div style="margin-top:12px;padding:12px;background:var(--surface);border-radius:8px;font-size:12px;color:var(--text-muted)">
        💬 Или напиши боту напрямую: @mindzip_support_bot
      </div>
    `;
  }
  
  document.getElementById('settingsContent').innerHTML = html;
}

function inviteFriend() {
  const botUsername = 'mindzip_bot';
  const refLink = 'https://t.me/' + botUsername + '?start=ref_' + state.dbId;
  const msg = encodeURIComponent(
    '🧠 Привет! Я пользуюсь «Вторым Мозгом» — это мой личный бот для заметок, идей и напоминаний.\n\n' +
    '📝 Сохраняю всё: текст, фото, голосовые, ссылки\n' +
    '🔍 Ищу по смыслу — просто пишу вопрос\n' +
    '⏰ Ставлю напоминания, и бот сам напоминает\n' +
    '📂 Делюсь папками с друзьями\n\n' +
    'Попробуй, тебе понравится! 🚀\n\n' +
    refLink
  );
  tg.openTelegramLink('https://t.me/share/url?url=' + encodeURIComponent(refLink) + '&text=' + msg);
  showToast('✅ Выбери друга в Telegram');
}

// Feedback to support bot
function sendFeedback() {
  const text = document.getElementById('feedbackText').value.trim();
  if (!text) { showToast('Напишите сообщение'); return; }
  fetch(API + 'feedback', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      user_id: state.user?.user_id || 0,
      username: tg.initDataUnsafe?.user?.username || '',
      text: text,
      topic: 'Mini App'
    })
  }).then(r=>r.json()).then(d => {
    if (d.ok) { showToast('✅ Сообщение отправлено в поддержку'); document.getElementById('feedbackText').value = ''; }
    else { showToast('❌ Ошибка отправки'); }
  }).catch(() => showToast('❌ Ошибка отправки'));
}

let feedbackFile = null;
function handleFeedbackFile(event) {
  const file = event.target.files[0];
  if (file) {
    feedbackFile = file;
    showToast('📎 Файл: ' + file.name);
  }
}

// === SEARCH ===
let searchTimer;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 300);
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) {
    renderHome();
    return;
  }
  
  try {
    const r = await fetch(API + 'entries_timezone?user_id=' + state.dbId + '&limit=50&search=' + encodeURIComponent(q));
    const d = await r.json();
    renderEntries(d.entries || [], 'searchResults');
    showPage('pageSearch');
    document.getElementById('headerTitle').textContent = '🔍 Результаты: ' + q;
  } catch(e) {
    showToast('Ошибка поиска');
  }
}

// === DETAIL ===
function openDetail(id) {
  const entry = state.entries.find(e => e.id === id) || state.folderEntries.find(e => e.id === id);
  if (!entry) return;
  state.currentEntry = entry;
  
  const tg = window.Telegram.WebApp;
  if (tg.BackButton) tg.BackButton.show();
  
  document.getElementById('detailTitle').textContent = entry.title || 'Запись';
  
  const d = new Date(entry.created_at).toLocaleDateString('ru-RU', {
    day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'
  });
  
  const tags = (entry.tags || []).map(t => `<span class="tag" style="margin-right:4px">#${t}</span>`).join('');
  const folder = entry.folder ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">📂 ${esc(entry.folder.icon)} ${esc(entry.folder.name)}</div>` : '';
  
  let actions = '';
  if (entry.source_url) actions += `<a href="${entry.source_url}" target="_blank"><button class="primary">🔗 Открыть ссылку</button></a> `;
  
  // File preview — inline просмотр
  let filePreview = '';
  const fileUrl = API + 'file/' + entry.id + '?user_id=' + state.dbId;
  
  if (entry.content_type === 'photo') {
    const imgUrl = fileUrl;
    filePreview = `<div class="file-preview" style="flex-direction:column;padding:0;overflow:hidden;cursor:pointer" onclick="showLightbox('${imgUrl}')">
      <img src="${imgUrl}" style="width:100%;max-height:300px;object-fit:cover;border-radius:8px" onerror="this.parentElement.innerHTML='<div style=\\'padding:14px;text-align:center\\'><span style=\\'font-size:32px\\'>📷</span><div style=\\'color:var(--text-muted);margin-top:4px\\'>Фото не загрузилось</div></div>'">
    </div>`;
  } else if (entry.content_type === 'file' || entry.content_type === 'document') {
    const fileName = (entry.title || 'Файл').toLowerCase();
    if (fileName.endsWith('.pdf')) {
      // PDF — inline просмотр через embed
      filePreview = `<div class="file-preview" style="flex-direction:column;padding:0;overflow:hidden">
        <embed src="${fileUrl}" type="application/pdf" style="width:100%;height:300px;border:none;border-radius:8px" onerror="this.outerHTML='<div style=\\'padding:14px;text-align:center\\'><span style=\\'font-size:32px\\'>📄</span><div style=\\'color:var(--text-muted);margin-top:4px\\'>PDF не загрузился</div></div>'">
        <div style="padding:10px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border)">
          <span style="font-size:13px;flex:1;color:var(--text-secondary)">📄 ${esc(entry.title||'PDF-файл')}</span>
          <button class="fp-open" onclick="tg.openLink?.('${fileUrl}')||window.open('${fileUrl}','_blank')">📤 Открыть</button>
        </div>
      </div>`;
    } else {
      // Другие файлы — кнопка открытия
      filePreview = `<div class="file-preview">
        <span class="fp-icon">📎</span>
        <span class="fp-name">${esc(entry.title||'Файл')}</span>
        <button class="fp-open" onclick="tg.openLink?.('${fileUrl}')||window.open('${fileUrl}','_blank')">📄 Открыть</button>
      </div>`;
    }
  } else if (entry.content_type === 'voice') {
    // Аудио — inline плеер
    filePreview = `<div class="file-preview" style="flex-direction:column;padding:10px 14px;gap:8px">
      <div style="display:flex;align-items:center;gap:10px;width:100%">
        <span style="font-size:24px">🎤</span>
        <span style="flex:1;font-size:13px;color:var(--text-secondary)">Голосовое сообщение</span>
      </div>
      <audio controls style="width:100%;height:40px" src="${fileUrl}" preload="auto">
        <source src="${fileUrl}" type="audio/ogg">
        Твой браузер не поддерживает аудио.
      </audio>
    </div>`;
  }
  
  // Calendar button for reminders
  let calButton = '';
  if (entry.is_task && entry.due_date) {
    const gcalLink = 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=' + encodeURIComponent(entry.title||'Напоминание') + '&dates=' + entry.due_date.replace(/[^0-9T]/g,'').slice(0,15) + '/' + entry.due_date.replace(/[^0-9T]/g,'').slice(0,15);
    calButton = `<button onclick="window.open('${gcalLink}','_blank')">📅 Google</button> `;
    calButton += `<button onclick="downloadICS(${entry.id})">📅 .ics</button> `;
    calButton += `<button onclick="showDatePicker(${entry.id})">✏️ Изменить дату</button> `;
  } else if (entry.due_date) {
    calButton = `<button onclick="showDatePicker(${entry.id})">✏️ Изменить дату</button> `;
  }
  
  actions += `<button onclick="copyText('${esc(entry.content_text||'')}')">📋 Копировать</button>`;
  // Folder + Share + Delete
  actions += `<button onclick="showMoveFolderMenu(${entry.id})">📂 Папка</button> `;
  actions += `<button onclick="showDetailShareMenu(${entry.id})">🔗 Поделиться</button> `;
  actions += `<button class="danger" onclick="deleteEntryFromDetail(${entry.id})">🗑️ Удалить</button>`;
  actions = calButton + actions;
  
  document.getElementById('detailBody').innerHTML = `
    <div class="dt">${esc(entry.title||'Без названия')}</div>
    <div class="dd">${d} · ID: ${entry.id}</div>
    ${folder}
    ${filePreview}
    <div class="dc">${esc(entry.content_text||'')}</div>
    ${tags ? `<div class="dtags">${tags}</div>` : ''}
    <div class="detail-actions">${actions}</div>
  `;
  
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  const tg = window.Telegram.WebApp;
  if (tg.BackButton) tg.BackButton.hide();
}

function copyText(t) {
  navigator.clipboard.writeText(t).then(() => showToast('✅ Скопировано')).catch(() => showToast('Ошибка копирования'));
}

// === DETAIL ACTIONS ===
function showMoveFolderMenu(entryId) {
  closeDetail();
  // Open context menu with folders
  const entry = state.entries.find(e => e.id === entryId) || state.folderEntries.find(e => e.id === entryId);
  state.currentEntry = entry;
  openContextMenu(entryId);
}

function showDetailShareMenu(entryId) {
  closeContextMenu();
  const friends = state.friends || [];
  if (!friends.length) {
    showToast('❌ Сначала добавь друзей');
    return;
  }
  let items = '<div style="padding:8px 16px;font-size:13px;color:var(--text-muted)">Поделиться записью с другом:</div>';
  friends.forEach(f => {
    const fname = f.first_name || f.username || ('ID: ' + f.id);
    items += `<button class="context-item" onclick="shareEntryWithFriend(${entryId},${f.id})">👤 ${esc(fname)}</button>`;
  });
  items += `<button class="context-item danger" onclick="closeContextMenu()">❌ Отмена</button>`;
  document.getElementById('contextSheet').innerHTML = items;
  document.getElementById('contextMenu').classList.add('open');
}

async function shareEntryWithFriend(entryId, friendId) {
  closeContextMenu();
  try {
    const r = await fetch(API + 'feedback', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: state.dbId, text: `🔗 Пользователь ${state.dbId} поделился записью #${entryId}`, topic: 'share'})
    });
    showToast('✅ Отправлено другу (через бота)');
  } catch(e) {
    showToast('❌ Ошибка');
  }
}

async function deleteEntryFromDetail(id) {
  if (!confirm('🗑️ Удалить запись навсегда?')) return;
  closeDetail();
  try {
    const r = await fetch(API + 'entries/delete', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({user_id: state.dbId, entry_id: id})
    });
    const d = await r.json();
    if (d.ok) {
      state.entries = state.entries.filter(e => e.id !== id);
      showToast('✅ Запись удалена');
      if (document.querySelector('.page.active')?.id === 'pageHome') renderHome();
    } else {
      showToast('❌ Ошибка удаления');
    }
  } catch(e) {
    showToast('❌ Ошибка удаления');
  }
}

// === DATE PICKER FOR REMINDERS ===
function showDatePicker(entryId) {
  const entry = state.entries.find(e => e.id === entryId) || state.folderEntries.find(e => e.id === entryId);
  if (!entry) return;
  
  const dueDate = entry.due_date ? new Date(entry.due_date) : new Date();
  const dateStr = dueDate.toISOString().split('T')[0];
  const timeStr = dueDate.toTimeString().slice(0,5);
  
  closeContextMenu();
  const items = `
    <div style="padding:12px 16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">📅 Изменить дату напоминания</div>
      <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Дата:</label>
      <input type="date" id="reminderDateInput" value="${dateStr}" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:12px">
      <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Время:</label>
      <input type="time" id="reminderTimeInput" value="${timeStr}" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:12px">
      <div style="display:flex;gap:8px">
        <button onclick="saveReminderDate(${entryId})" style="flex:2;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">✅ Сохранить</button>
        <button onclick="removeReminderDate(${entryId})" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:14px;cursor:pointer;font-family:inherit">🗑️ Удалить</button>
      </div>
      <button onclick="closeContextMenu()" style="width:100%;padding:8px;margin-top:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;font-family:inherit">❌ Отмена</button>
    </div>
  `;
  document.getElementById('contextSheet').innerHTML = items;
  document.getElementById('contextMenu').classList.add('open');
}

async function saveReminderDate(entryId) {
  const dateVal = document.getElementById('reminderDateInput').value;
  const timeVal = document.getElementById('reminderTimeInput').value;
  if (!dateVal || !timeVal) { showToast('❌ Выбери дату и время'); return; }
  
  const dt = new Date(dateVal + 'T' + timeVal);
  const dueISO = dt.toISOString().replace('T', ' ').slice(0, 19);
  closeContextMenu();
  
  try {
    const r = await fetch(API + 'entries/reminder', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        user_id: state.dbId,
        entry_id: entryId,
        action: 'set',
        due_date: dueISO
      })
    });
    const d = await r.json();
    if (d.ok) {
      showToast('✅ Дата напоминания обновлена');
      // Reload to refresh
      setTimeout(() => loadData(), 500);
    } else {
      showToast('❌ Ошибка');
    }
  } catch(e) {
    showToast('❌ Ошибка');
  }
}

async function removeReminderDate(entryId) {
  closeContextMenu();
  try {
    const r = await fetch(API + 'entries/reminder', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        user_id: state.dbId,
        entry_id: entryId,
        action: 'delete'
      })
    });
    const d = await r.json();
    if (d.ok) {
      showToast('✅ Напоминание удалено');
      state.entries = state.entries.map(e => e.id === entryId ? {...e, is_task: false, due_date: null} : e);
      if (document.querySelector('.page.active')?.id === 'pageReminders') renderReminders();
      else if (document.querySelector('.page.active')?.id === 'pageHome') renderHome();
    } else {
      showToast('❌ Ошибка');
    }
  } catch(e) {
    showToast('❌ Ошибка');
  }
}

// === REMINDER CONTEXT MENU FIX ===
function openReminderMenu(id) {
  const entry = state.entries.find(e => e.id === id);
  if (!entry) return;
  const items = `
    <button class="context-item" onclick="showDatePicker(${id})">📅 Изменить дату</button>
    <button class="context-item" onclick="showToast('Редактируй в карточке')">✏️ Изменить заголовок</button>
    <button class="context-item danger" onclick="removeReminderConfirm(${id})">🗑️ Удалить напоминание</button>
  `;
  document.getElementById('contextSheet').innerHTML = items;
  document.getElementById('contextMenu').classList.add('open');
}

function removeReminderConfirm(id) {
  if (!confirm('Удалить напоминание?')) return;
  closeContextMenu();
  removeReminderDate(id);
}

// === FEEDBACK ===
async function sendFeedback() {
  const text = document.getElementById('feedbackText').value.trim();
  if (!text) { showToast('Напишите сообщение'); return; }
  
  try {
    const r = await fetch(API + 'feedback', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        user_id: state.user?.user_id || 0,
        username: tg.initDataUnsafe?.user?.username || '',
        text: text,
        topic: 'Mini App'
      })
    });
    const d = await r.json();
    if (d.ok) {
      showToast('✅ Сообщение отправлено');
      document.getElementById('feedbackText').value = '';
    } else {
      showToast('❌ Ошибка отправки');
    }
  } catch(e) {
    showToast('❌ Ошибка отправки');
  }
}

// === NAV ===
function switchTab(tab) {
  const tabs = ['home','folders','reminders','favorites','settings'];
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[tabs.indexOf(tab)].classList.add('active');
  
  const titles = {home:'Второй Мозг', folders:'📂 Папки', reminders:'⏰ Напоминания', favorites:'⭐ Избранное', settings:'⚙️ Ещё'};
  document.getElementById('headerTitle').textContent = titles[tab];
  
  if (tab === 'home') renderHome();
  if (tab === 'reminders') renderReminders();
  if (tab === 'favorites') renderFavorites();
  if (tab === 'settings') renderSettings();
  
  showPage('page' + tab.charAt(0).toUpperCase() + tab.slice(1));
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// === TOAST ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// === UTILS ===
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// === INIT ===
auth();
</script>
